# Scan Auto-Crop Configuration
# =============================
# All tunable thresholds in one place.

confidence:
  # Tier 1: High confidence -- auto-crop, skip LLM
  tier1_threshold: 90
  # Tier 2: Medium confidence -- validate with LLM
  tier2_threshold: 40
  # Below tier2 = Tier 3: flag for manual review, keep original

llm:
  enabled: true
  # Mode: "off" = no LLM, "post_cv" = CV first then LLM validates,
  #        "pre_cv" = LLM decides first, then CV crops if needed
  mode: "post_cv"
  model: "qwen3.5:2b"
  timeout_seconds: 60
  # What to do if LLM fails (timeout, error, unavailable)
  # "SKIP" = keep original (safest), "SAFE" = assume crop is fine
  fallback_on_error: "SKIP"

validators:
  # Only applied to pre-cropped photos (min dim < 2000px)
  edge_variance_threshold: 500
  histogram_correlation_threshold: 0.70
  face_detection_enabled: true
